<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="PokéDraft — Build the Ultimate Team">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2140"/>
      <stop offset="1" stop-color="#0f1220"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffd76a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.1" r="0.9">
      <stop offset="0" stop-color="#2a3566" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#2a3566" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>

  <!-- type-color confetti dots -->
  <g opacity="0.7">
    <circle cx="120" cy="70" r="7" fill="#EE8130"/>
    <circle cx="1180" cy="90" r="6" fill="#6390F0"/>
    <circle cx="1090" cy="300" r="8" fill="#7AC74C"/>
    <circle cx="200" cy="300" r="6" fill="#F95587"/>
    <circle cx="1015" cy="60" r="5" fill="#6F35FC"/>
    <circle cx="90" cy="220" r="5" fill="#F7D02C"/>
  </g>

  <!-- pokeball -->
  <g transform="translate(430,180) scale(1.15)">
    <circle cx="0" cy="0" r="70" fill="#fff" stroke="#11131f" stroke-width="6"/>
    <path d="M -70 0 A 70 70 0 0 1 70 0 Z" fill="#ef4444" stroke="#11131f" stroke-width="6"/>
    <line x1="-70" y1="0" x2="70" y2="0" stroke="#11131f" stroke-width="6"/>
    <circle cx="0" cy="0" r="22" fill="#fff" stroke="#11131f" stroke-width="6"/>
    <circle cx="0" cy="0" r="9" fill="#fff" stroke="#11131f" stroke-width="4"/>
  </g>

  <!-- wordmark -->
  <text x="540" y="170" font-family="Segoe UI, system-ui, sans-serif" font-size="92" font-weight="800" fill="url(#title)">PokéDraft</text>
  <text x="544" y="222" font-family="Segoe UI, system-ui, sans-serif" font-size="30" font-weight="600" fill="#9aa2c4">Build the ultimate team — six blind picks.</text>

  <!-- type chips -->
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="700" fill="#fff">
    <g transform="translate(544,250)">
      <rect width="92" height="34" rx="17" fill="#6F35FC"/>
      <text x="46" y="23" text-anchor="middle">DRAGON</text>
    </g>
    <g transform="translate(648,250)">
      <rect width="74" height="34" rx="17" fill="#EE8130"/>
      <text x="37" y="23" text-anchor="middle">FIRE</text>
    </g>
    <g transform="translate(734,250)">
      <rect width="86" height="34" rx="17" fill="#F95587"/>
      <text x="43" y="23" text-anchor="middle">FAIRY</text>
    </g>
    <g transform="translate(832,250)">
      <rect width="92" height="34" rx="17" fill="#7AC74C"/>
      <text x="46" y="23" text-anchor="middle">GRASS</text>
    </g>
  </g>
</svg>
